services:
  - type: web
    name: codercollab-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: codercollab-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: codercollab-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: codercollab-db
    plan: free

  - name: codercollab-redis
    plan: free
    ipAllowList: []